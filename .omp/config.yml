# Project-level omp overrides for firstmate sessions (tracked, generic).
# Mechanism: project .omp/config.yml merges over ~/.omp/agent/config.yml;
# array values REPLACE the global value wholesale (subtractive by design).
# Machine-specific trims belong in the untracked .omp/settings.json - use
# disabledExtensions: ["skill:<name>", ...] there, NOT ignoredSkills, so the
# two files never clobber each other's arrays in the shared settings layer.
skills:
  # This template does not use no-mistakes unless the cap requests it (AGENTS.md).
  ignoredSkills: ["no-mistakes"]
  # Do NOT set includeSkills here: it does not merely preload - it REPLACES
  # the discoverable skill registry wholesale, making every unlisted skill
  # unreadable via skill:// (verified live 2026-07-17: a session with only
  # [bootstrap, recovery] listed got "Unknown skill: firstmate-task-lifecycle").
  # The cached-prefix preload of the every-session skills is `fm start`'s
  # --append-system-prompt injection; skill discovery must stay complete.
